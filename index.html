<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Cup Jam</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #05080f;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
